name: Publish Articles

on:
  schedule:
    # 24 crons per day (~30min intervals, staggered, KST = UTC+9)
    - cron: '31 15 * * *'   # KST 00:31
    - cron: '19 16 * * *'   # KST 01:19
    - cron: '47 16 * * *'   # KST 01:47
    - cron: '8 17 * * *'    # KST 02:08
    - cron: '53 17 * * *'   # KST 02:53
    - cron: '22 18 * * *'   # KST 03:22
    - cron: '41 19 * * *'   # KST 04:41
    - cron: '14 20 * * *'   # KST 05:14
    - cron: '36 21 * * *'   # KST 06:36
    - cron: '5 22 * * *'    # KST 07:05
    - cron: '48 22 * * *'   # KST 07:48
    - cron: '27 23 * * *'   # KST 08:27
    - cron: '11 0 * * *'    # KST 09:11
    - cron: '42 0 * * *'    # KST 09:42
    - cron: '18 1 * * *'    # KST 10:18
    - cron: '55 1 * * *'    # KST 10:55
    - cron: '33 2 * * *'    # KST 11:33
    - cron: '7 3 * * *'     # KST 12:07
    - cron: '44 3 * * *'    # KST 12:44
    - cron: '21 4 * * *'    # KST 13:21
    - cron: '52 5 * * *'    # KST 14:52
    - cron: '16 7 * * *'    # KST 16:16
    - cron: '39 9 * * *'    # KST 18:39
    - cron: '3 12 * * *'    # KST 21:03
  workflow_dispatch: # Manual trigger

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Create .env.local
        run: |
          cat > .env.local << 'EOF'
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL=${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY=${{ secrets.FIREBASE_PRIVATE_KEY }}
          EOF

      - name: Create Firebase service account
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > medicalkorea-2205a-firebase-adminsdk-fbsvc-70fd6e21f4.json

      - name: Publish next article
        run: node publish-action.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          CHROME_PATH: /usr/bin/google-chrome-stable

      - name: Submit to IndexNow
        if: success()
        run: node indexnow-submit.js
