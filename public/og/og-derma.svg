<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#881337"/>
      <stop offset="100%" style="stop-color:#4a044e"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.15)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="315" fill="url(#shine)"/>

  <!-- Decorative circles -->
  <circle cx="1050" cy="150" r="180" fill="rgba(255,255,255,0.06)"/>
  <circle cx="1100" cy="500" r="120" fill="rgba(255,255,255,0.04)"/>
  <circle cx="150" cy="550" r="100" fill="rgba(255,255,255,0.04)"/>

  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="rgba(255,255,255,0.08)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Icon area -->
  <g transform="translate(900, 100)">
    <circle cx="80" cy="80" r="70" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
    <path d="M80 40 L86 65 L110 65 L90 80 L96 105 L80 90 L64 105 L70 80 L50 65 L74 65Z" fill="rgba(255,255,255,0.3)" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  </g>

  <!-- Logo badge -->
  <rect x="60" y="50" width="44" height="44" rx="10" fill="rgba(255,255,255,0.2)"/>
  <text x="82" y="80" font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle">K</text>
  <text x="118" y="78" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="600" fill="rgba(255,255,255,0.9)">Korea Beauty Guide</text>

  <!-- Main title -->
  <text x="60" y="300" font-family="Arial,Helvetica,sans-serif" font-size="56" font-weight="bold" fill="white">Beauty Clinic Guide</text>

  <!-- Subtitle -->
  <text x="60" y="360" font-family="Arial,Helvetica,sans-serif" font-size="24" fill="rgba(255,255,255,0.8)">Real reviews from Naver, Kakao, Google + specialist verified data</text>

  <!-- Bottom badges -->
  <rect x="60" y="480" width="160" height="36" rx="18" fill="rgba(255,255,255,0.15)"/>
  <text x="140" y="504" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">Naver Place</text>

  <rect x="240" y="480" width="140" height="36" rx="18" fill="rgba(255,255,255,0.15)"/>
  <text x="310" y="504" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">KakaoMap</text>

  <rect x="400" y="480" width="160" height="36" rx="18" fill="rgba(255,255,255,0.15)"/>
  <text x="480" y="504" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">Google Maps</text>

  <rect x="580" y="480" width="100" height="36" rx="18" fill="rgba(255,255,255,0.15)"/>
  <text x="630" y="504" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">HIRA</text>

  <!-- Bottom bar -->
  <rect x="60" y="550" width="1080" height="2" fill="rgba(255,255,255,0.1)"/>
  <text x="60" y="585" font-family="Arial,Helvetica,sans-serif" font-size="13" fill="rgba(255,255,255,0.5)">medicalkoreaguide.com</text>
  <text x="1140" y="585" font-family="Arial,Helvetica,sans-serif" font-size="13" fill="rgba(255,255,255,0.5)" text-anchor="end">13 Languages</text>
</svg>