<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#2d3748"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  
  <!-- Grid dots -->
  <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="15" cy="15" r="0.8" fill="rgba(255,255,255,0.06)"/>
  </pattern>
  <rect width="800" height="400" fill="url(#dots)"/>
  
  <!-- Decorative circle -->
  <circle cx="650" cy="200" r="160" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <circle cx="650" cy="200" r="100" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  
  <!-- Rank number large -->
  <text x="620" y="260" font-family="Arial,Helvetica,sans-serif" font-size="200" font-weight="900" fill="rgba(255,255,255,0.06)" text-anchor="middle">3</text>
  
  <!-- Rank badge -->
  <rect x="40" y="40" width="72" height="72" rx="16" fill="#cd7f32"/>
  <text x="76" y="90" font-family="Arial,Helvetica,sans-serif" font-size="36" font-weight="900" fill="#0f172a" text-anchor="middle">#3</text>
  
  <!-- Title area -->
  <text x="130" y="72" font-family="Arial,Helvetica,sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.5)">Medical Korea Guide</text>
  <text x="130" y="96" font-family="Arial,Helvetica,sans-serif" font-size="14" fill="rgba(255,255,255,0.3)">Recommended Clinic</text>
  
  <!-- Divider -->
  <rect x="40" y="140" width="400" height="1.5" fill="rgba(255,255,255,0.1)"/>
  
  <!-- Info section -->
  <text x="40" y="185" font-family="Arial,Helvetica,sans-serif" font-size="16" fill="#818cf8">Verified by Real Reviews</text>
  
  <!-- Platform badges -->
  <rect x="40" y="220" width="90" height="28" rx="14" fill="rgba(255,255,255,0.1)"/>
  <text x="85" y="239" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.7)" text-anchor="middle">Naver</text>
  
  <rect x="140" y="220" width="90" height="28" rx="14" fill="rgba(255,255,255,0.1)"/>
  <text x="185" y="239" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.7)" text-anchor="middle">Kakao</text>
  
  <rect x="240" y="220" width="90" height="28" rx="14" fill="rgba(255,255,255,0.1)"/>
  <text x="285" y="239" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.7)" text-anchor="middle">Google</text>
  
  <rect x="340" y="220" width="70" height="28" rx="14" fill="rgba(255,255,255,0.1)"/>
  <text x="375" y="239" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.7)" text-anchor="middle">HIRA</text>
  
  <!-- Bottom bar -->
  <rect x="40" y="340" width="720" height="1" fill="rgba(255,255,255,0.08)"/>
  <text x="40" y="370" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="rgba(255,255,255,0.3)">medicalguide.co.kr</text>
  <text x="760" y="370" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="rgba(255,255,255,0.3)" text-anchor="end">Data-driven clinic comparison</text>
</svg>